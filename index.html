  const CAT = {

  let activeIdx = 0;            // -1 = 전체

  // ===== 길찾기(네비게이션) — 구글맵 앱으로 핸드오프 =====
  let NAV_MODE = 'transit';
  const NAV_LABEL = { transit:'대중교통', walking:'도보', driving:'자동차' };
  function setNavMode(m){ NAV_MODE = m; SKIP_FIT = true; render(); SKIP_FIT = false; }
  function dirDayRoute(d){
    const p = d.stops.filter(x=>x.lat&&x.lng);
    if(p.length<2) return null;
    const o = p[0].lat+','+p[0].lng, dest = p[p.length-1].lat+','+p[p.length-1].lng;
    const mids = p.slice(1,-1).slice(0,9).map(x=>x.lat+','+x.lng).join('|');
    return 'https://www.google.com/maps/dir/?api=1&origin='+o+'&destination='+dest+(mids?'&waypoints='+mids:'')+'&travelmode='+NAV_MODE;
  }

  function numIcon(color, n, muted){
    const size = muted ? 22 : 26;
    const op = muted ? 0.55 : 1;
    return L.divIcon({ className:'',
      html:`<div class="num-marker" style="width:${size}px;height:${size}px;background:${color};opacity:${op}">${n}</div>`,
      iconSize:[size,size], iconAnchor:[size/2,size/2], popupAnchor:[0,-size/2] });
  }

  function badgeHtml(s){
    let h='';
    h += `<span class="badge b-cat">${catEmoji(s.category)} ${s.category}</span>`;
    if (s.reservation==='예약필수') h += `<span class="badge b-resv">🔴 예약필수</span>`;
    else if (s.reservation==='완료') h += `<span class="badge b-ok">✅ 예약완료</span>`;
    else if (s.reservation==='권장') h += `<span class="badge b-rec">🟡 예약권장</span>`;
    if (s.risk==='heat') h += `<span class="badge b-heat">☀️ 더위주의</span>`;
    if (s.risk==='reservation_critical') h += `<span class="badge b-crit">⚠️ 시급</span>`;
    return h;
  }

  function popupHtml(s, prev){
    let h = `<div class="pop"><div class="ph">${catEmoji(s.category)} ${s.name}</div>`;
    if (s.name_en) h += `<div class="pt">${s.name_en}</div>`;
    if (s.time_start) h += `<div class="pt">⏱ ${s.time_start}${s.time_end?('–'+s.time_end):''}</div>`;
    h += `<div class="badges" style="margin-top:5px">${badgeHtml(s)}</div>`;
    if (s.transport) h += `<div class="row"><b>🚉 이동</b> ${s.transport.mode} · ${s.transport.from_prev_min}분${s.transport.cost_jpy?(' · ¥'+s.transport.cost_jpy):''}</div>`;
    if (s.hours) h += `<div class="row"><b>🕒 영업</b> ${s.hours}</div>`;
    if (s.admission_jpy!=null && s.admission_jpy>0) h += `<div class="row"><b>💴</b> ¥${s.admission_jpy.toLocaleString()}</div>`;
    if (s.memo) h += `<div class="memo">${s.memo}</div>`;
    if (s.scores) { const LB=['접근','가성비','맛','4인','끼니','예약','교토']; h += `<div style="margin:6px 0 2px">`; if(s.rank) h += `<div style="font-size:12px;margin-bottom:3px">🏅 순위 <b>#${s.rank}</b> · 총점 <b style="color:#c0392b">${s.total}</b>/5${s.region?(' · 📍'+s.region):''}</div>`; s.scores.forEach((v,i)=>{ const c=v>=4?'#27ae60':(v>=3?'#2980b9':'#e67e22'); h += `<div style="display:flex;align-items:center;gap:4px;font-size:10.5px;margin:1px 0"><span style="width:42px;color:#6b7280">${LB[i]}</span><span style="flex:1;background:#eee;border-radius:3px;height:6px;overflow:hidden"><i style="display:block;width:${v*20}%;height:6px;background:${c}"></i></span><span style="width:12px;text-align:right">${v}</span></div>`; }); h += `</div>`; }
    h += `<a class="gmap" target="_blank" href="https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}&travelmode=${NAV_MODE}">🧭 현재위치→여기 (${NAV_LABEL[NAV_MODE]})</a>`;
    if (prev) h += `<a class="gmap" target="_blank" style="background:#5f6368;margin-left:6px" href="https://www.google.com/maps/dir/?api=1&origin=${prev.lat},${prev.lng}&destination=${s.lat},${s.lng}&travelmode=${NAV_MODE}">↳ 이전→여기</a>`;
    h += `</div>`;
    return h;
  }

  function buildTabs(){
    const t = document.getElementById('tabs');
    t.innerHTML='';
    const all = document.createElement('div');
    all.className='tab'+(activeIdx===-1?' active':'');
    all.style.background = activeIdx===-1 ? '#374151':'#fff';
    all.innerHTML = `<span class="swatch" style="background:#374151"></span>전체`;
    all.onclick = ()=>{ activeIdx=-1; render(); };
    t.appendChild(all);
    TRIP.days.forEach((d,i)=>{
      const el=document.createElement('div');
      el.className='tab'+(activeIdx===i?' active':'');
      if(activeIdx===i) el.style.background=d.color;
      el.innerHTML = `<span class="swatch" style="background:${d.color}"></span>${d.dow}${d.date?(' '+d.date.slice(5)):''}`;
      el.onclick = ()=>{ activeIdx=i; render(); };
      t.appendChild(el);
    });
  }

  function focusStop(id){
    const m = markerById[id];
    if(!m) return;
    map.panTo(m.getLatLng(), {animate:true});
    m.openPopup();
    document.querySelectorAll('.item').forEach(x=>x.classList.remove('active'));
    const li = document.querySelector(`.item[data-id="${id}"]`);
    if(li){ li.classList.add('active'); li.scrollIntoView({block:'nearest',behavior:'smooth'}); }
  }

    {var __dr=(d.route!==false)?dirDayRoute(d):null; h+='<div style="padding:8px 14px;border-bottom:1px solid var(--line);display:flex;flex-wrap:wrap;gap:6px;align-items:center"><span style="font-size:11px;color:var(--muted)">🧭 길찾기</span>'; ['transit','walking','driving'].forEach(function(mm){var on=NAV_MODE===mm; h+='<button onclick="setNavMode(\''+mm+'\')" style="font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid '+(on?'#1a73e8':'var(--line)')+';background:'+(on?'#1a73e8':'#fff')+';color:'+(on?'#fff':'#374151')+';cursor:pointer">'+NAV_LABEL[mm]+'</button>';}); if(__dr) h+='<a href="'+__dr+'" target="_blank" style="margin-left:auto;font-size:11.5px;font-weight:600;background:#0f9d58;color:#fff;padding:5px 11px;border-radius:6px;text-decoration:none">오늘 동선 전체 ▶</a>'; h+='</div>';}
    {const regs={}; d.stops.forEach(x=>{ if(x.region_color) regs[x.region]=x.region_color; }); if(Object.keys(regs).length){ h+='<div style="padding:6px 14px;display:flex;flex-wrap:wrap;gap:6px;border-bottom:1px solid var(--line)">'; for(const r in regs){ h+='<span style="font-size:10px;display:flex;align-items:center;gap:3px"><i style="width:10px;height:10px;border-radius:50%;background:'+regs[r]+'"></i>'+r+'</span>'; } h+='</div>'; }}

      h+=`<div class="item ${cls}" data-id="${s.id}">

  function renderSidebarAll(){
    const side=document.getElementById('side');
    let h=`<div class="day-head"><div class="ttl">전체 일정 (일~금)</div><div class="meta">요일 탭을 누르면 해당 날만 봅니다</div></div>`;

  function addDayToMap(d, muted){
    const pts=[];
    d.stops.forEach((s,si)=>{
      const m=L.marker([s.lat,s.lng], {icon:numIcon(s.region_color||d.color,s.seq,muted)});
      m.bindPopup(popupHtml(s, (d.route!==false && si>0) ? d.stops[si-1] : null));
      m.on('click', ()=>{ // sync sidebar
        document.querySelectorAll('.item').forEach(x=>x.classList.remove('active'));
        const li=document.querySelector(`.item[data-id="${s.id}"]`);
        if(li){ li.classList.add('active'); li.scrollIntoView({block:'nearest',behavior:'smooth'}); }
      });
      m.addTo(layer);
      markerById[s.id]=m;
      pts.push([s.lat,s.lng]);
    });
    if(pts.length>1 && d.route!==false) L.polyline(pts,{color:d.color,weight: muted?2:4,opacity: muted?0.35:0.65}).addTo(layer);
    return pts;
  }

  function render(){
    buildTabs();
    layer.clearLayers(); markerById={};
    if(activeIdx===-1){
      let all=[];
      TRIP.days.forEach(d=>{ all=all.concat(addDayToMap(d,true)); });
      renderSidebarAll();
      if(all.length && !SKIP_FIT) map.fitBounds(all,{padding:[40,40]});
    } else {
      const d=TRIP.days[activeIdx];
      const pts=addDayToMap(d,false);
      renderSidebarDay(d);
      if(pts.length && !SKIP_FIT) map.fitBounds(pts,{padding:[50,50]});
    }

          var won=document.createElement("span"); won.className="ei-won"; won.textContent="≈₩"+fmt(jKrw(e.amount));
          l1.appendChild(badge); l1.appendChild(amt); l1.appendChild(won);
          var l2=document.createElement("div"); l2.className="wk-note ei-2"; l2.textContent=(e.payer||"?")+" 결제 · 분담 "+(((e.parts&&e.parts.length))||1)+"인"+(e.memo?(" · "+e.memo):"");
          L.appendChild(l1); L.appendChild(l2); row.appendChild(L);
          var rx=document.createElement("div"); rx.className="rx";
          var be=document.createElement("button"); be.textContent="✏️"; be.addEventListener("click",function(ev){ ev.stopPropagation(); startEdit(e); });
          var bd=document.createElement("button"); bd.textContent="🗑"; bd.addEventListener("click",function(ev){ ev.stopPropagation(); delEntry(e); });
          rx.appendChild(be); rx.appendChild(bd); row.appendChild(rx);
          ebody.appendChild(row);
        });
      });
    }
    function sumBy(fn){ var m={}; entries.forEach(function(e){ var k=fn(e); if(k==null)return; m[k]=(m[k]||0)+(Number(e.amount)||0); }); return m; }
    function block(title,obj){ var d=document.createElement("div"); var t=document.createElement("div"); t.style.fontWeight="700"; t.style.margin="10px 0 4px"; t.textContent=title; d.appendChild(t); var keys=Object.keys(obj); var max=Math.max.apply(null,keys.map(function(k){return obj[k];}).concat([1])); keys.sort(function(a,b){return obj[b]-obj[a];}).forEach(function(k){ var v=obj[k]; var r=document.createElement("div"); r.style.fontSize="12.5px"; r.textContent=k+" : ¥"+fmt(v)+" (≈₩"+fmt(jKrw(v))+")"; var bar=document.createElement("div"); bar.className="bar"; var i=document.createElement("i"); i.style.width=(v/max*100)+"%"; bar.appendChild(i); d.appendChild(r); d.appendChild(bar); }); return d; }
    function tabAgg(){
      ebody.innerHTML=""; ebody.appendChild(refreshBtn());
      if(!entries.length){ ebody.appendChild(elNote("데이터 없음.")); return; }
      var tot=entries.reduce(function(s,e){return s+(Number(e.amount)||0);},0);
      var head=document.createElement("div"); head.style.fontWeight="700"; head.textContent="총 ¥"+fmt(tot)+" ≈ ₩"+fmt(jKrw(tot))+" / $"+jUsd(tot).toFixed(0); ebody.appendChild(head);
      ebody.appendChild(block("분류별",sumBy(function(e){return e.cat;})));
      ebody.appendChild(block("일자별",sumBy(function(e){return e.date;})));
      var paid={}; MEMBERS.forEach(function(m){paid[m]=0;}); entries.forEach(function(e){ if(e.payer!=null) paid[e.payer]=(paid[e.payer]||0)+(Number(e.amount)||0); });
      ebody.appendChild(block("결제자별(지출)",paid));
      var days={}; entries.forEach(function(e){ if(e.date) days[e.date]=1; }); var nDays=Math.max(Object.keys(days).length,1); var nMem=MEMBERS.length;
      var food=0, allow=0; entries.forEach(function(e){ var a=Number(e.amount)||0; if(e.cat==="식비") food+=a; else if(e.cat!=="숙박") allow+=a; });
      var foodPP=jUsd(food)/(nDays*nMem), allowPP=jUsd(allow)/(nDays*nMem);
      var bt=document.createElement("div"); bt.style.fontWeight="700"; bt.style.margin="10px 0 4px"; bt.textContent="예산 대비 (1인·일 평균, 추정)"; ebody.appendChild(bt);
      function budLine(lbl,val,bud){ var r=document.createElement("div"); r.style.fontSize="12.5px"; r.textContent=lbl+" $"+val.toFixed(0)+" / 예산 $"+bud+" ("+Math.round(val/bud*100)+"%)"; var bar=document.createElement("div"); bar.className="bar"; var i=document.createElement("i"); i.style.width=Math.min(val/bud*100,100)+"%"; if(val>bud) i.style.background="#c0392b"; bar.appendChild(i); ebody.appendChild(r); ebody.appendChild(bar); }
      budLine("식비",foodPP,130); budLine("일비(식비·숙박 외)",allowPP,40);
      ebody.appendChild(elNote("일수 "+nDays+" · 인원 "+nMem+" 기준 추정."));
    }
    function tabSettle(){
      ebody.innerHTML=""; ebody.appendChild(refreshBtn());
      if(!entries.length){ ebody.appendChild(elNote("데이터 없음.")); return; }
      var net={}; MEMBERS.forEach(function(m){net[m]=0;});
      entries.forEach(function(e){ var a=Number(e.amount)||0; if(e.payer!=null) net[e.payer]=(net[e.payer]||0)+a; var pr=(e.parts&&e.parts.length)?e.parts:MEMBERS; var sh=a/pr.length; pr.forEach(function(m){ net[m]=(net[m]||0)-sh; }); });
      var cred=[], debt=[]; Object.keys(net).forEach(function(m){ var w=jKrw(net[m]); if(w>1) cred.push({m:m,v:w}); else if(w<-1) debt.push({m:m,v:-w}); });
      cred.sort(function(a,b){return b.v-a.v;}); debt.sort(function(a,b){return b.v-a.v;});
      var tr=[], ci=0, di=0;
      while(ci<cred.length&&di<debt.length){ var amt=Math.min(cred[ci].v,debt[di].v); tr.push({from:debt[di].m,to:cred[ci].m,amt:amt}); cred[ci].v-=amt; debt[di].v-=amt; if(cred[ci].v<1)ci++; if(debt[di].v<1)di++; }
      var h=document.createElement("div"); h.style.fontWeight="700"; h.style.margin="2px 0 6px"; h.textContent="정산 (₩ 기준 · 최소 송금)"; ebody.appendChild(h);
      if(!tr.length){ ebody.appendChild(elNote("정산할 차액이 없습니다.")); }
      tr.forEach(function(t){ var r=document.createElement("div"); r.className="erow"; r.textContent=t.from+" → "+t.to+"   ₩"+fmt(t.amt); ebody.appendChild(r); });
      ebody.appendChild(elNote("결제액 − (항목별 1/참여자수) 분담액 기준."));
    }
    loadCache();
  })();

</script>
